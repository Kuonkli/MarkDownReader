<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>markdown</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header class="header">
    <div>
        <button class="headerbutton" id="login">
            Login
        </button>
        <button class="headerbutton" id = "register">
            Register
        </button>
    </div>
  </header>

  <main class="main">
    <div class="container">
        <div class="linkblock">
            <div class="pastelinkarea">
                <input type="text" id="repo-link" placeholder="Paste your repo link...">
            </div>
            <div class="readmdbutton">
                <button id = "readmdbutton">
                    READ MD
                </button>
            </div>
        </div>
        <p>OR</p>
        <div class="uploadmdbutton">
            <button id = "uploadmdbutton">
                UPLOAD MD
            </button>
        </div>
    </div>
  </main>

  <footer class="footer">
    <p>&copy; All rights reserved</p>
  </footer>
</body>
</html>
